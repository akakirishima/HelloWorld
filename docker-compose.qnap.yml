services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.qnap
    platform: linux/arm64
    environment:
      APP_ENV: production
      APP_BASE_URL: ${APP_BASE_URL:-http://172.16.1.10:8088}
      DATA_ROOT_PATH: /app/data/nas
      SQLITE_PATH: ${SQLITE_PATH:-/app/data/local.db}
      SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:-change-me-for-production}
      CORS_ORIGINS: ${APP_BASE_URL:-http://172.16.1.10:8088}
      ALLOWED_SUBNETS: ${ALLOWED_SUBNETS:-172.16.1.0/24}
      AUTO_SEED: "false"
    volumes:
      - ${QNAP_APP_ROOT}:/app/data/nas
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.qnap
    platform: linux/arm64
    environment:
      VITE_API_BASE_URL: /api
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    platform: linux/arm64
    depends_on:
      - frontend
      - backend
    ports:
      - "8088:80"
    volumes:
      - ./infra/caddy/Caddyfile.qnap:/etc/caddy/Caddyfile:ro
    restart: unless-stopped
