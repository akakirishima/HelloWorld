services:
  backend:
    build:
      context: ./backend
    command: >
      sh -c "uvicorn app.main:app --reload --host 0.0.0.0 --port 8000"
    environment:
      APP_ENV: development
      DATA_ROOT_PATH: /app/data/nas
      SQLITE_PATH: /app/data/local.db
      CORS_ORIGINS: http://localhost:5173,http://localhost:8088
    volumes:
      - ./backend:/app
      - nas-data:/app/data/nas
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: /api
      VITE_API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    ports:
      - "5173:5173"

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "8088:80"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro

volumes:
  frontend_node_modules:
  nas-data:
    driver: local
    driver_opts:
      type: cifs
      o: "username=admin,password=!Thithiken1,uid=1000,gid=1000,vers=3.0"
      device: "//172.16.1.118/Public/HelloWorld"
